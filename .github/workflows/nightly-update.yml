name: Nightly Activity Update

on:
  schedule:
    - cron: '0 * * * *' # Menjalankan setiap jam
  workflow_dispatch: # Memungkinkan update manual

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update Activity
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { data: events } = await github.rest.activity.listEventsForAuthenticatedUser({
              username: context.repo.owner,
              per_page: 50
            });

            // Filter aktivitas malam (18:00 - 06:00 UTC+8)
            const nightActivities = events.filter(event => {
              const date = new Date(event.created_at);
              const hour = (date.getUTCHours() + 8) % 24;
              return hour >= 18 || hour <= 6;
            }).slice(0, 5);

            let activityText = nightActivities.length > 0 
              ? nightActivities.map(event => {
                  const type = event.type.replace('Event', '')
                    .replace('Push', '🚀 Push')
                    .replace('Create', '✨ Create')
                    .replace('PullRequest', '🔧 PR')
                    .replace('Watch', '⭐ Starred')
                    .replace('Delete', '🗑️ Deleted');
                  
                  const isPublic = event.public;
                  const repoName = event.repo.name;
                  const repoLink = isPublic 
                    ? `[${repoName}](https://github.com/${repoName})` 
                    : '`🔒 Private Repository`';
                  
                  const time = new Date(event.created_at).toLocaleTimeString('en-GB', { 
                    timeZone: 'Asia/Makassar', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                  });
                  
                  return `> **${type}** di ${repoLink} — \`${time}\``;
                }).join('\n\n')
              : "> *Belum ada aktivitas malam ini. Waktunya istirahat! 😴*";

            const fs = require('fs');
            const readmePath = 'README.md';
            const readme = fs.readFileSync(readmePath, 'utf8');
            
            const startTag = '<!-- START_SECTION:activity -->';
            const endTag = '<!-- END_SECTION:activity -->';
            
            const contentRegex = new RegExp(`${startTag}[\\s\\S]*${endTag}`);
            const updatedContent = `${startTag}\n${activityText}\n${endTag}`;
            
            const newReadme = readme.replace(contentRegex, updatedContent);
            fs.writeFileSync(readmePath, newReadme);

      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "docs: update nightly activity" || exit 0
          git push
